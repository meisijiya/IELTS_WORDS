name: Reset-Admin-Password

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: "New password for admin user (min 6 chars)"
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset admin password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/yasi-words
            echo "=== git pull ==="
            git fetch origin main 2>&1 | tail -2
            git reset --hard origin/main 2>&1 | tail -2
            echo "=== run reset-admin-password.ts ==="
            NEW_PASSWORD='${{ inputs.new_password }}'
            docker exec -i yasi-app node -e "
              const { PrismaClient } = require('@prisma/client');
              const crypto = require('crypto');
              const pw = process.env.NEW_PW;
              if (!pw || pw.length < 6) { console.error('password too short'); process.exit(1); }
              const salt = crypto.randomBytes(16);
              const key = crypto.pbkdf2Sync(pw, salt, 100000, 32, 'sha256');
              const b64 = (b) => b.toString('base64');
              const hash = b64(salt) + '.' + b64(key);
              (async () => {
                const p = new PrismaClient();
                const r = await p.user.updateMany({
                  where: { role: 'admin' },
                  data: { passwordHash: hash },
                });
                console.log('updated', r.count, 'admin row(s)');
                const u = await p.user.findFirst({ where: { role: 'admin' }, select: { id: true, username: true, role: true } });
                console.log('admin now:', JSON.stringify(u));
                await p.\$disconnect();
              })().catch((e) => { console.error(e); process.exit(1); });
            " NEW_PW="$NEW_PASSWORD" 2>&1 | tail -10
            echo "=== verify login API ==="
            sleep 2
            curl -s -i -X POST http://localhost:3000/api/auth/login -H "Content-Type: application/json" -d "{\"username\":\"admin\",\"password\":\"$NEW_PASSWORD\"}" 2>&1 | head -5