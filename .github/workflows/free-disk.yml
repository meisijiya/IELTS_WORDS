name: Free-Disk

on:
  workflow_dispatch:

jobs:
  free:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk + verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "=== disk before ==="
            df -h /
            echo "=== docker df ==="
            docker system df 2>&1 | head -10
            echo "=== docker images (largest 10) ==="
            docker images --format "{{.Size}}\t{{.Repository}}:{{.Tag}}\t{{.CreatedSince}}" | sort -h | tail -10
            echo "=== docker volumes ==="
            docker volume ls --format "{{.Name}} {{.Size}}" 2>&1 | head -10 || true
            echo "=== docker system prune -a (removes all unused images, networks, build cache) ==="
            docker system prune -a -f --filter "until=24h" 2>&1 | tail -10 || true
            echo "=== disk after ==="
            df -h /
            echo "=== top dir /var/lib/docker ==="
            du -sh /var/lib/docker 2>/dev/null
            du -sh /var/lib/docker/* 2>/dev/null | sort -hr | head -10
            echo "=== apt/journal ==="
            du -sh /var/log/journal 2>/dev/null || true
            journalctl --vacuum-time=1d 2>&1 | tail -3 || true