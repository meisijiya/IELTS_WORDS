name: Free-Disk

on:
  workflow_dispatch:

jobs:
  free:
    runs-on: ubuntu-latest
    steps:
      - name: Aggressive docker prune
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== before ==="
            df -h /
            docker system df 2>&1 | head -6
            echo "=== list all yasi images (oldest first) ==="
            docker images --format "{{.ID}} {{.Size}} {{.CreatedSince}} {{.Repository}}:{{.Tag}}" | grep yasi-words | sort -k3
            echo "=== remove ALL yasi-words images except the currently running one ==="
            CURRENT_ID=$(docker ps --filter "name=yasi-app" --format "{{.Image}}")
            echo "current yasi-app image: $CURRENT_ID"
            docker images --format "{{.ID}} {{.Repository}}:{{.Tag}}" | grep "yasi-words" | while read id tag; do
              if [ "$id" != "$CURRENT_ID" ]; then
                echo "removing $id ($tag)"
                docker rmi -f "$id" 2>&1 | tail -2 || true
              fi
            done
            echo "=== prune dangling + build cache ==="
            docker image prune -f 2>&1 | tail -3
            docker builder prune -f 2>&1 | tail -3 || true
            echo "=== after ==="
            df -h /
            docker system df 2>&1 | head -6