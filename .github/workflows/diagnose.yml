name: Diagnose

on:
  workflow_dispatch:
    inputs:
      cmd:
        description: "Shell command to run on the server"
        required: true
        default: "docker logs --tail 80 yasi-app 2>&1; echo '---'; docker exec -T yasi-postgres psql -U yasi -d yasi_db -c 'SELECT id, username, role, length(\"passwordHash\") AS hash_len FROM \"User\";'"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/yasi-words
            bash -lc "${{ inputs.cmd }}"