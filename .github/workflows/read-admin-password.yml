name: Read-Admin-Password

on:
  workflow_dispatch:

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - name: Read .admin_password + .env ADMIN_PASSWORD
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== .admin_password ==="
            cat /opt/yasi-words/.admin_password 2>&1 | sed 's/\(.\{4\}\).*/\1***REDACTED***/'
            echo "=== .env ADMIN_PASSWORD (redacted) ==="
            grep ADMIN_PASSWORD /opt/yasi-words/.env 2>&1 | sed 's/=.*/=<REDACTED>/'
            echo "=== User rows ==="
            docker exec -i yasi-postgres psql -U yasi -d yasi_db -c 'SELECT id, username, role, length("passwordHash") AS hash_len FROM "User";'
            echo "=== ADMIN_PASSWORD from running container env ==="
            docker exec yasi-app env | grep ADMIN_PASSWORD | sed 's/=.*/=<REDACTED>/'