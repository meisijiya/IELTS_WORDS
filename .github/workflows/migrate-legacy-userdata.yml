name: Migrate-Legacy-UserData
on:
  workflow_dispatch:
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Run migrate-legacy-userdata.sql + verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/yasi-words
            git fetch origin main 2>&1 | tail -2
            git reset --hard origin/main 2>&1 | tail -2
            echo "=== before ==="
            docker exec -i yasi-postgres psql -U yasi -d yasi_db -c 'SELECT "userId", COUNT(*) FROM "Attempt" GROUP BY "userId" ORDER BY "userId";'
            echo "=== running migrate-legacy-userdata.sql ==="
            docker exec -i yasi-postgres psql -U yasi -d yasi_db -v ON_ERROR_STOP=1 < /opt/yasi-words/scripts/migrate-legacy-userdata.sql 2>&1 | tail -15
            echo "=== after ==="
            docker exec -i yasi-postgres psql -U yasi -d yasi_db -c 'SELECT "userId", COUNT(*) FROM "Attempt" GROUP BY "userId" ORDER BY "userId";'
            docker exec -i yasi-postgres psql -U yasi -d yasi_db -c 'SELECT MIN("createdAt"), MAX("createdAt"), COUNT(*) FROM "Attempt";'
            echo "=== restart app ==="
            docker restart yasi-app
            sleep 10
            echo "=== admin dashboard check ==="
            COOKIE=$(curl -s -i -X POST http://localhost:3000/api/auth/login -H "Content-Type: application/json" -d '{"username":"admin","password":"Admin@2026"}' | grep -i "^set-cookie:" | head -1 | sed 's/.*: //; s/;.*//')
            curl -s "http://localhost:3000/api/analytics?wordbookId=1&range=all" -H "Cookie: $COOKIE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('today attempts:', d['byRange']['today']['totalAttempted'])
print('total attempts ever:', d['recent']['totalAttempts'])
print('mastered words:', d['progress']['masteredWords'])
"