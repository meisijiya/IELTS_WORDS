name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build Docker image & push to Aliyun ACR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry (Personal Edition)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract version
        id: meta
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            # Full audio bundle (20194 mp3 files, 238 MB). Manually uploaded to the
            # release page since GH Release Assets API caps uploads at 100 MB per
            # file. Tag the new release when re-fetching is needed.
            AUDIO_BUNDLE_URL=https://github.com/meisijiya/IELTS_WORDS/releases/download/audio-full-2026-07-23/audio_full.tgz
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:${{ steps.meta.outputs.short_sha }}
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:${{ steps.meta.outputs.timestamp }}
          # cache disabled: registry-cached layers can mask updates to
          # build-arg-baked content (audio URL changed, layer reused, image
          # still had the old partial audio set). 5-6 min cold build is fine.
          cache-from: ""
          cache-to: ""

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment:
      name: production
      # url: removed — GitHub Actions does not allow `secrets.*` in
      # environment.url; parse error blocks the whole workflow.

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "[deploy] pulling new image..."
            cd /opt/yasi-words
            export ALIYUN_REGISTRY='${{ secrets.ALIYUN_REGISTRY }}'
            export ALIYUN_REGISTRY_NAMESPACE='${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}'
            # Login to pull from ACR
            echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login \
              -u '${{ secrets.ALIYUN_REGISTRY_USERNAME }}' \
              --password-stdin \
              ${{ secrets.ALIYUN_REGISTRY }}
            # Pull the freshly pushed image tag (no fallback rebuild — CI/CD exists
            # for a reason). docker-compose.yml's image: ${APP_IMAGE:-} picks it up.
            export APP_IMAGE='${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:latest'
            docker pull "$APP_IMAGE"
            docker compose pull app
            docker compose up -d --force-recreate app
            # Prune old images
            docker image prune -f --filter "until=24h"
            echo "[deploy] complete."

      - name: Health check
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            if curl -fsS http://${{ secrets.DEPLOY_HOST }}:3000/login >/dev/null; then
              echo "[health] OK"
              exit 0
            fi
            echo "[health] waiting... ($i)"
            sleep 5
          done
          echo "[health] FAILED"
          exit 1