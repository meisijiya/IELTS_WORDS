name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default to read-only token; deploy job needs contents:read only (no write).
permissions:
  contents: read

jobs:
  build-and-push:
    name: Build Docker image & push to Aliyun ACR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry (Personal Edition)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract version
        id: meta
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            # Full audio bundle (20194 mp3 files, 238 MB). Manually uploaded to the
            # release page since GH Release Assets API caps uploads at 100 MB per
            # file. Tag the new release when re-fetching is needed.
            AUDIO_BUNDLE_URL=https://github.com/meisijiya/IELTS_WORDS/releases/download/audio-full-2026-07-23/audio_full.tgz
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:${{ steps.meta.outputs.short_sha }}
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:${{ steps.meta.outputs.timestamp }}
          # cache disabled: registry-cached layers can mask updates to
          # build-arg-baked content (audio URL changed, layer reused, image
          # still had the old partial audio set). 5-6 min cold build is fine.
          cache-from: ""
          cache-to: ""

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment:
      name: production
      # url: removed — GitHub Actions does not allow `secrets.*` in
      # environment.url; parse error blocks the whole workflow.

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "[deploy] starting..."
            cd /opt/yasi-words

            # ===== DB protection: pre-check =====
            # Postgres container + pgdata volume MUST already exist before any
            # deploy step. This script MUST NOT call `docker compose down -v`,
            # `docker compose down postgres`, or `--force-recreate postgres` —
            # any of those would delete the named `pgdata` volume and lose
            # every User / Attempt / Session / Checkin / UserWord row.
            # Only `app` is recreated below; postgres / pgdata are read-only
            # from this script's perspective.
            echo "[deploy] pre-check: pgdata volume present?"
            docker volume inspect pgdata > /dev/null 2>&1 || {
              echo "[deploy] FATAL: pgdata volume missing. ABORT to protect any possible user data."
              exit 1
            }
            echo "[deploy] pre-check: yasi-postgres container running?"
            docker ps --filter "name=yasi-postgres" --filter "status=running" --format "{{.Names}}" | grep -q '^yasi-postgres$' || {
              echo "[deploy] FATAL: yasi-postgres container not running. ABORT."
              exit 1
            }

            export ALIYUN_REGISTRY='${{ secrets.ALIYUN_REGISTRY }}'
            export ALIYUN_REGISTRY_NAMESPACE='${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}'
            # Login to pull from ACR
            echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login \
              -u '${{ secrets.ALIYUN_REGISTRY_USERNAME }}' \
              --password-stdin \
              ${{ secrets.ALIYUN_REGISTRY }}
            # Pull the freshly pushed image tag (no fallback rebuild — CI/CD exists
            # for a reason). docker-compose.yml's image: ${APP_IMAGE:-} picks it up.
            export APP_IMAGE='${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/yasi-words:latest'
            docker pull "$APP_IMAGE"
            docker compose pull app
            # Recreate `app` ONLY. `postgres` service is intentionally absent
            # from this command — see DB protection block above.
            docker compose up -d --force-recreate app

            # ===== Server-side image prune =====
            # Keep: current running image + 1 most-recent non-current = 2 total.
            # (ACR-side retention is enforced by Alibaba Cloud lifecycle policy
            # configured out-of-band on the registry console; this server-side
            # prune is the local-disk safety net.)
            echo "[deploy] pruning old yasi-words images (keep current + 1 rollback)..."
            CURRENT_ID=$(docker ps --filter "name=yasi-app" --format "{{.Image}}" | head -1)
            docker images --format "{{.ID}}|{{.CreatedAt}}|{{.Repository}}:{{.Tag}}" \
              | grep "yasi-words" \
              | sort -t'|' -k2 -r \
              | awk -F'|' -v keep_id="$CURRENT_ID" '{
                  if ($1 == keep_id) next
                  if (++seen > 1) print $1
                }' \
              | xargs -r docker rmi -f 2>&1 | tail -5 || true
            docker image prune -f --filter "until=24h" 2>&1 | tail -3 || true
            docker builder prune -f --filter "until=24h" 2>&1 | tail -3 || true

            # ===== DB protection: post-check =====
            # Verify postgres still healthy after the app recreate. The recreate
            # should not have touched postgres / pgdata, but verify defensively.
            PGUSER=$(grep '^POSTGRES_USER=' /opt/yasi-words/.env 2>/dev/null | cut -d= -f2- || echo yasi)
            PGDB=$(grep '^POSTGRES_DB=' /opt/yasi-words/.env 2>/dev/null | cut -d= -f2- || echo yasi_db)
            echo "[deploy] post-check: pg_isready on yasi-postgres..."
            if ! docker exec yasi-postgres pg_isready -U "$PGUSER" -d "$PGDB" > /dev/null 2>&1; then
              echo "[deploy] WARN: pg_isready failed — check 'docker logs yasi-postgres'"
            fi

            echo "[deploy] disk after prune:"
            df -h / | tail -1
            echo "[deploy] complete."

      - name: Health check
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            if curl -fsS http://${{ secrets.DEPLOY_HOST }}:3000/login >/dev/null; then
              echo "[health] OK"
              exit 0
            fi
            echo "[health] waiting... ($i)"
            sleep 5
          done
          echo "[health] FAILED"
          exit 1